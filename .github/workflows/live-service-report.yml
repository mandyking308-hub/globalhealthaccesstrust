name: Live service report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Load live public configuration
        run: |
          set -a
          source .env
          set +a
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> "$GITHUB_ENV"

      - name: Verify live services
        continue-on-error: true
        run: node scripts/verify-live-services.mjs

      - name: Upload live service report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-service-report
          path: live-service-failures.txt
          if-no-files-found: error
