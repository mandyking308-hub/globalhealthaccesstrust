name: Audit Legal Language

on:
  push:
    paths:
      - ".github/workflows/audit-legal-language.yml"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record remaining legacy legal wording
        run: |
          {
            echo "GHAT legal wording audit"
            echo "Generated from commit: $GITHUB_SHA"
            echo
            grep -RInE --exclude='*.pdf' --exclude-dir='node_modules' --exclude-dir='.git' \
              'Trust Deed|trust deed|charitable trust|1 December 2024|effective from 1 December 2024|effective 1 December 2024|constituted by' src public || true
          } > legal-audit.txt
          cat legal-audit.txt

      - name: Remove one-time workflow
        run: rm .github/workflows/audit-legal-language.yml

      - name: Commit audit record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add legal-audit.txt .github/workflows/audit-legal-language.yml
          git commit -m "Record final legal wording audit"
          git push
