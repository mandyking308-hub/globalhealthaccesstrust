name: Finish GHAT homepage and history experience

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finish-home-history-experience.yml"

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preserve content and apply presentation fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"Expected pattern not found for {label} in {path}")
              path.write_text(text.replace(old, new, 1))

          # Homepage: remove the superseded editorial cards only, retain all other sections,
          # and place the five live workstreams immediately after the Board statement.
          home = Path("src/pages/HomePage.tsx")
          text = home.read_text()

          import_anchor = 'import { organizationSchema } from "@/lib/seo";\n'
          workstreams_import = 'import { HomepageWorkstreamsSection } from "@/components/workstreams/HomepageWorkstreamsSection";\n'
          if workstreams_import not in text:
              if import_anchor not in text:
                  raise SystemExit("Homepage import anchor not found")
              text = text.replace(import_anchor, import_anchor + workstreams_import, 1)

          for unused_import in [
              'import clinicImage from "@/assets/ghat-maternal-care.jpg";\n',
              'import systemsImage from "@/assets/ghat-infrastructure-delivery.jpg";\n',
              'import ruralImage from "@/assets/ghat-capacity-training.jpg";\n',
          ]:
              text = text.replace(unused_import, "")

          start_marker = '        <section className="p-6 md:p-16 lg:p-24 border-b border-foreground/10 bg-background">'
          purpose_marker = '        <section className="bg-primary text-primary-foreground py-24 md:py-32">'
          start = text.find(start_marker)
          purpose = text.find(purpose_marker)
          if start == -1 or purpose == -1 or purpose <= start:
              raise SystemExit("Superseded homepage section boundaries were not found")
          text = text[:start] + text[purpose:]

          if '<HomepageWorkstreamsSection />' not in text:
              if purpose_marker not in text:
                  raise SystemExit("Homepage purpose section anchor not found")
              text = text.replace(
                  purpose_marker,
                  '        <HomepageWorkstreamsSection />\n\n' + purpose_marker,
                  1,
              )
          home.write_text(text)

          # The workstreams now live inside HomePage, not after the entire Outlet.
          layout = Path("src/components/layout/Layout.tsx")
          text = layout.read_text()
          text = text.replace('import { HomepageWorkstreamsSection } from "@/components/workstreams/HomepageWorkstreamsSection";\n', '')
          text = text.replace('        {location.pathname === "/" && <HomepageWorkstreamsSection />}\n', '')
          layout.write_text(text)

          # Make the five-workstream heading use the same display system as the homepage.
          workstreams = Path("src/components/workstreams/HomepageWorkstreamsSection.tsx")
          text = workstreams.read_text()
          old_heading = '''            className="mb-5 text-foreground"
            style={{ fontFamily: "var(--font-sans)", fontSize: "clamp(34px, 4.4vw, 64px)", lineHeight: 1.02, letterSpacing: "-0.035em", fontWeight: 650, textTransform: "none" }}
'''
          new_heading = '''            className="display-condensed mb-5 text-foreground"
'''
          if old_heading not in text:
              raise SystemExit("Current-workstream heading pattern was not found")
          workstreams.write_text(text.replace(old_heading, new_heading, 1))

          # Ensure mobile and tablet controls remain clearly visible beside the wordmark.
          header = Path("src/components/layout/Header.tsx")
          text = header.read_text()
          replacements = {
              'className="h-10 w-[180px] sm:h-12 sm:w-[270px] md:h-16 md:w-auto"':
                  'className="h-10 w-[148px] sm:h-12 sm:w-[220px] md:h-14 md:w-[245px] lg:h-16 lg:w-auto"',
              'className="flex items-center gap-2 sm:gap-4 flex-shrink-0 pl-0 sm:pl-2 lg:pl-4 lg:border-l lg:border-foreground/10"':
                  'className="flex items-center gap-1 sm:gap-3 flex-shrink-0 pl-0 sm:pl-2 lg:pl-4 lg:border-l lg:border-foreground/10"',
              'className="h-9 w-9 sm:h-10 sm:w-10 flex items-center justify-center text-foreground/70 hover:text-foreground transition-colors"':
                  'className="h-11 w-11 flex items-center justify-center border border-foreground/15 bg-background text-foreground hover:border-primary/40 hover:text-primary transition-colors"',
              'className="lg:hidden h-9 w-9 flex items-center justify-center"':
                  'className="lg:hidden h-11 w-11 flex items-center justify-center border border-foreground/15 bg-background text-foreground hover:border-primary/40 hover:text-primary transition-colors"',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Header pattern not found: {old}")
              text = text.replace(old, new, 1)
          header.write_text(text)

          # Replace the secondary work navigation with a three-column mobile layout.
          Path("src/components/layout/WorkNavigationStrip.tsx").write_text('''import { Link, useLocation } from "react-router-dom";

const items = [
  { label: "Current Workstreams", href: "/current-workstreams" },
  { label: "Our Work", href: "/our-work" },
  { label: "Our History", href: "/our-history" },
];

export const WorkNavigationStrip = () => {
  const location = useLocation();

  return (
    <nav aria-label="Work and project navigation" className="border-b border-foreground/10 bg-primary text-primary-foreground">
      <div className="mx-auto grid max-w-[1400px] grid-cols-3 items-stretch px-2 sm:px-6 md:flex md:items-center md:gap-1 md:px-8">
        <span className="hidden shrink-0 pr-4 text-[10px] font-bold uppercase tracking-[0.2em] text-primary-foreground/65 md:inline">
          Explore
        </span>
        {items.map((item) => {
          const active =
            location.pathname === item.href ||
            (item.href === "/current-workstreams" && location.pathname.startsWith("/current-workstreams/")) ||
            (item.href === "/our-history" && location.pathname.startsWith("/our-history/"));

          return (
            <Link
              key={item.href}
              to={item.href}
              className={`flex min-w-0 items-center justify-center border-b-2 px-1.5 py-3 text-center text-[9.5px] font-bold uppercase tracking-[0.08em] no-underline transition-colors sm:px-4 sm:text-[11px] sm:tracking-[0.15em] md:shrink-0 ${
                active
                  ? "border-accent bg-white/[0.08] text-primary-foreground"
                  : "border-transparent text-primary-foreground/78 hover:bg-white/[0.06] hover:text-primary-foreground"
              }`}
            >
              {item.label}
            </Link>
          );
        })}
      </div>
    </nav>
  );
};
''')

          # Add curated thematic visual records without altering any history-page copy.
          history_dir = Path("src/components/history")
          history_dir.mkdir(parents=True, exist_ok=True)
          Path("src/components/history/HistoryVisualInterlude.tsx").write_text('''import conflictAfrica from "@/assets/conflict-africa-humanitarian.jpg";
import emergencyRelief from "@/assets/emergency-relief-hero.jpg";
import healthcareAccess from "@/assets/healthcare-access-hero.jpg";
import familyMedicalCare from "@/assets/family-medical-care.jpg";
import conflictUkraine from "@/assets/conflict-ukraine-humanitarian.jpg";
import educationTraining from "@/assets/education-training-hero.jpg";
import capacityTraining from "@/assets/ghat-capacity-training.jpg";
import fieldClinic from "@/assets/ghat-field-clinic-humanitarian.jpg";

type VisualRecord = {
  src: string;
  alt: string;
  title: string;
  caption: string;
};

const visualRecords: Record<string, VisualRecord[]> = {
  "/our-history/1991-1999": [
    {
      src: conflictAfrica,
      alt: "Humanitarian workers moving through a conflict-affected African setting",
      title: "Humanitarian response across borders",
      caption: "A thematic editorial image reflecting conflict response, displacement and the community networks described in this chapter.",
    },
    {
      src: emergencyRelief,
      alt: "Emergency relief supplies prepared for distribution",
      title: "Practical support in times of crisis",
      caption: "A thematic editorial image reflecting fundraising, essential goods and direct community support during the 1990s.",
    },
  ],
  "/our-history/2000-2009": [
    {
      src: healthcareAccess,
      alt: "Healthcare access in an underserved community setting",
      title: "Healthcare access and humanitarian need",
      caption: "A thematic editorial image reflecting the chapter's focus on health access, disaster response and vulnerable communities.",
    },
    {
      src: familyMedicalCare,
      alt: "A family receiving medical support in a community setting",
      title: "Children, families and continuity of care",
      caption: "A thematic editorial image reflecting child health, disability inclusion and sustained family support.",
    },
  ],
  "/our-history/2010-2019": [
    {
      src: conflictUkraine,
      alt: "Humanitarian support in a conflict-affected European setting",
      title: "Conflict, displacement and recovery",
      caption: "A thematic editorial image reflecting the decade's work around refugees, conflict response and communities under pressure.",
    },
    {
      src: educationTraining,
      alt: "Professionals taking part in a field training session",
      title: "Professional learning and wider capability",
      caption: "A thematic editorial image reflecting the growing international network, training and shared professional purpose.",
    },
  ],
  "/our-history/2020-2026": [
    {
      src: capacityTraining,
      alt: "A multi-region group of professionals in a field training session",
      title: "A coordinated international network",
      caption: "A thematic editorial image reflecting the clinical, professional and community relationships that supported the work during this period.",
    },
    {
      src: fieldClinic,
      alt: "A field clinic providing humanitarian healthcare",
      title: "From voluntary service to a permanent Trust",
      caption: "A thematic editorial image reflecting frontline health access, practical delivery and the formal development of GHAT.",
    },
  ],
};

export const HistoryVisualInterlude = ({ pathname }: { pathname: string }) => {
  const records = visualRecords[pathname];
  if (!records) return null;

  return (
    <section className="history-visual-interlude" aria-label="Thematic visual record">
      <div className="history-visual-interlude__heading">
        <p>Visual record</p>
        <h2>Images that reflect the chapter</h2>
        <span>
          These are carefully selected thematic editorial images. They do not identify a named beneficiary or claim to depict one specific recorded event.
        </span>
      </div>
      <div className="history-visual-interlude__grid">
        {records.map((record, index) => (
          <figure key={record.title} className={index === 1 ? "history-visual-interlude__figure history-visual-interlude__figure--offset" : "history-visual-interlude__figure"}>
            <div className="history-visual-interlude__image-wrap">
              <img src={record.src} alt={record.alt} loading="lazy" />
              <span>Editorial archive · {pathname.split("/").pop()}</span>
            </div>
            <figcaption>
              <strong>{record.title}</strong>
              <span>{record.caption}</span>
            </figcaption>
          </figure>
        ))}
      </div>
    </section>
  );
};
''')

          styles_dir = Path("src/styles")
          styles_dir.mkdir(parents=True, exist_ok=True)
          Path("src/styles/history-editorial.css").write_text('''.history-editorial h2,
.history-editorial h3 {
  font-family: var(--font-serif) !important;
  text-transform: uppercase !important;
  letter-spacing: -0.008em !important;
  color: hsl(var(--foreground));
}

.history-editorial h2 {
  font-size: clamp(30px, 4vw, 52px) !important;
  font-weight: 900 !important;
  line-height: 1.02 !important;
}

.history-editorial h3 {
  font-size: clamp(20px, 2vw, 28px) !important;
  font-weight: 800 !important;
  line-height: 1.12 !important;
}

.history-visual-interlude {
  margin: clamp(56px, 8vw, 104px) 0;
  border-top: 1px solid hsl(var(--foreground) / 0.14);
  border-bottom: 1px solid hsl(var(--foreground) / 0.14);
  padding: clamp(36px, 6vw, 72px) 0;
}

.history-visual-interlude__heading {
  display: grid;
  gap: 14px;
  max-width: 760px;
  margin-bottom: clamp(28px, 5vw, 52px);
}

.history-visual-interlude__heading > p {
  margin: 0;
  color: hsl(var(--primary));
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.history-visual-interlude__heading > h2 {
  margin: 0;
}

.history-visual-interlude__heading > span {
  color: hsl(var(--muted-foreground));
  font-family: var(--font-sans);
  font-size: clamp(14px, 1.1vw, 16px);
  line-height: 1.7;
}

.history-visual-interlude__grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: clamp(20px, 4vw, 44px);
  align-items: start;
}

.history-visual-interlude__figure {
  margin: 0;
}

.history-visual-interlude__figure--offset {
  margin-top: clamp(24px, 5vw, 64px);
}

.history-visual-interlude__image-wrap {
  position: relative;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: hsl(var(--muted));
}

.history-visual-interlude__image-wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, hsl(var(--foreground) / 0.42), transparent 46%);
  pointer-events: none;
}

.history-visual-interlude__image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(0.78) contrast(1.04);
}

.history-visual-interlude__image-wrap > span {
  position: absolute;
  z-index: 1;
  left: 18px;
  bottom: 15px;
  color: white;
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.history-visual-interlude figcaption {
  display: grid;
  gap: 8px;
  padding-top: 18px;
}

.history-visual-interlude figcaption strong {
  font-family: var(--font-serif);
  font-size: clamp(19px, 2vw, 27px);
  font-weight: 800;
  line-height: 1.08;
  text-transform: uppercase;
}

.history-visual-interlude figcaption span {
  color: hsl(var(--muted-foreground));
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.65;
}

@media (max-width: 640px) {
  .history-visual-interlude__grid {
    grid-template-columns: 1fr;
  }

  .history-visual-interlude__figure--offset {
    margin-top: 12px;
  }

  .history-visual-interlude__image-wrap {
    aspect-ratio: 16 / 11;
  }
}
''')

          # The shared content layout injects the visual record into decade pages only.
          Path("src/components/layout/ContentLayout.tsx").write_text('''import { Children, Fragment, ReactNode } from "react";
import { useLocation } from "react-router-dom";
import { HistoryVisualInterlude } from "@/components/history/HistoryVisualInterlude";
import "@/styles/history-editorial.css";

interface ContentLayoutProps {
  children: ReactNode;
  className?: string;
}

const decadeRoutes = new Set([
  "/our-history/1991-1999",
  "/our-history/2000-2009",
  "/our-history/2010-2019",
  "/our-history/2020-2026",
]);

export const ContentLayout = ({ children, className = "" }: ContentLayoutProps) => {
  const location = useLocation();
  const childItems = Children.toArray(children);
  const isHistoryRoute = location.pathname === "/our-history" || location.pathname.startsWith("/our-history/");
  const isDecadeRoute = decadeRoutes.has(location.pathname);
  const visualAfter = Math.min(2, Math.max(0, childItems.length - 2));

  return (
    <div className="min-h-screen bg-background">
      <div className="max-w-[1100px] mx-auto px-6 sm:px-8 lg:px-12 py-16 md:py-24 lg:py-32">
        <div className={`content-prose content-layout ${isHistoryRoute ? "history-editorial" : ""} ${className}`}>
          {childItems.map((child, index) => (
            <Fragment key={index}>
              {child}
              {isDecadeRoute && index === visualAfter && <HistoryVisualInterlude pathname={location.pathname} />}
            </Fragment>
          ))}
        </div>
      </div>
    </div>
  );
};
''')

          # Remove this one-time workflow from the completed site.
          Path(".github/workflows/finish-home-history-experience.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finish homepage flow and history presentation"
          git push
