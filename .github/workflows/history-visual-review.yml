name: Apply GHAT tablet responsive fixes

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/history-visual-review.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct tablet header and homepage layout
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          header = Path('src/components/layout/Header.tsx')
          text = header.read_text()
          old = 'className="hidden sm:inline-flex items-center h-10'
          if text.count(old) != 2:
              raise SystemExit('Expected two tablet portal button classes')
          header.write_text(text.replace(old, 'className="hidden lg:inline-flex items-center h-10'))

          home = Path('src/pages/HomePage.tsx')
          text = home.read_text()
          replacements = {
              '<span className="text-[11px] uppercase tracking-[0.22em] font-semibold text-primary md:mt-3">Mandate</span>\n              <div>': '<span className="text-[11px] uppercase tracking-[0.22em] font-semibold text-primary md:mt-3">Mandate</span>\n              <div className="min-w-0">',
              'className="grid grid-cols-1 md:grid-cols-12 gap-10 md:gap-16 items-start"': 'className="grid grid-cols-1 lg:grid-cols-12 gap-10 lg:gap-16 items-start"',
              'className="md:col-span-5 md:sticky md:top-28"': 'className="lg:col-span-5 lg:sticky lg:top-28"',
              'className="md:col-span-7 divide-y divide-foreground/12 border-t border-b border-foreground/15"': 'className="lg:col-span-7 divide-y divide-foreground/12 border-t border-b border-foreground/15"',
          }
          for old_text, new_text in replacements.items():
              if old_text not in text:
                  raise SystemExit(f'Expected homepage layout pattern not found: {old_text}')
              text = text.replace(old_text, new_text, 1)
          home.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/layout/Header.tsx src/pages/HomePage.tsx
          git commit -m "Fix tablet header and homepage overflow"
          git push
