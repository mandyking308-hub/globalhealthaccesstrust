name: GHAT tablet overflow diagnostic

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/history-visual-review.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx vite build
      - name: Start preview
        run: |
          bunx vite preview --host 0.0.0.0 --port 4173 >/tmp/preview.log 2>&1 &
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/preview.log
          exit 1
      - name: Find tablet overflow elements
        run: |
          mkdir -p overflow-diagnostic
          cat > diagnose.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';
          const pages = [
            ['home','/'],['our-work','/our-work'],['history-index','/our-history'],
            ['history-1991','/our-history/1991-1999'],['history-2000','/our-history/2000-2009'],
            ['history-2010','/our-history/2010-2019'],['history-2020','/our-history/2020-2026']
          ];
          const browser = await chromium.launch({executablePath:'/usr/bin/google-chrome',headless:true,args:['--no-sandbox']});
          const report=[];
          for (const [name,route] of pages) {
            const context=await browser.newContext({viewport:{width:768,height:1024}});
            const page=await context.newPage();
            await page.goto(`http://127.0.0.1:4173${route}`,{waitUntil:'networkidle'});
            const result=await page.evaluate(() => {
              const vw=document.documentElement.clientWidth;
              const offenders=Array.from(document.querySelectorAll('body *')).map((el)=>{
                const r=el.getBoundingClientRect();
                const s=getComputedStyle(el);
                return {tag:el.tagName,id:el.id,className:typeof el.className==='string'?el.className:'',text:(el.textContent||'').trim().replace(/\s+/g,' ').slice(0,80),left:r.left,right:r.right,width:r.width,position:s.position,overflowX:s.overflowX};
              }).filter(x=>x.width>0&&(x.right>vw+1||x.left<-1)).sort((a,b)=>(b.right-vw)-(a.right-vw)).slice(0,30);
              return {scrollWidth:document.documentElement.scrollWidth,clientWidth:vw,offenders};
            });
            report.push({name,route,...result});
            await context.close();
          }
          await browser.close();
          await writeFile('overflow-diagnostic/report.json',JSON.stringify(report,null,2));
          EOF
          bun diagnose.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: ghat-tablet-overflow-diagnostic
          path: overflow-diagnostic
          retention-days: 7
