name: Supabase deployment credential check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check protected credential availability
        id: credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          : > supabase-credential-report.txt
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN: present" >> supabase-credential-report.txt
          else
            echo "SUPABASE_ACCESS_TOKEN: missing" >> supabase-credential-report.txt
          fi
          if [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DB_PASSWORD: present" >> supabase-credential-report.txt
          else
            echo "SUPABASE_DB_PASSWORD: missing" >> supabase-credential-report.txt
          fi
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload credential availability report
        uses: actions/upload-artifact@v4
        with:
          name: supabase-credential-report
          path: supabase-credential-report.txt
          if-no-files-found: error

      - name: Report credentials available
        if: steps.credentials.outputs.ready == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'GHAT Supabase deployment credentials',
              description: 'Protected Supabase deployment credentials are available',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Report credentials missing
        if: steps.credentials.outputs.ready != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'GHAT Supabase deployment credentials',
              description: 'One or more protected Supabase deployment credentials are missing',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
