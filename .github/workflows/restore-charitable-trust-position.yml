name: Restore GHAT Charitable Trust Position

on:
  push:
    paths:
      - ".github/workflows/restore-charitable-trust-position.yml"

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore the last known-good charitable-trust wording
        shell: bash
        run: |
          BASE=8fb495eb34c7e8fa897cafe813787677a9c964e6
          files=(
            src/components/TrusteeBiographiesGrid.tsx
            src/components/common/SearchModal.tsx
            src/lib/constants.ts
            src/pages/AboutPage.tsx
            src/pages/AboutTheTrustPage.tsx
            src/pages/CharitableHistory2020sPage.tsx
            src/pages/CharitableHistoryPage.tsx
            src/pages/FrequentlyAskedQuestionsPage.tsx
            src/pages/GovernanceLegalFrameworkPage.tsx
            src/pages/PrivacyPolicyPage.tsx
            src/pages/PublicationsPage.tsx
            src/pages/TermsOfUsePage.tsx
            src/pages/TrusteeBiographiesPage.tsx
            src/pages/admin/AdminManualPage.tsx
          )
          for file in "${files[@]}"; do
            git show "$BASE:$file" > "$file"
          done

      - name: Add the accurate two-document explanation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected wording not found in {path}: {old[:90]}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          replace(
              "src/pages/AboutTheTrustPage.tsx",
              '''          <h2>Constitution &amp; Governance</h2>
          <p>Global Health Access Trust is governed by its signed Constitution, effective 1 December 2024. It establishes the Trust's charitable purposes, trustee powers and decision-making framework, supported by the governance policies published on this website.</p>
          <p className="block"><a href="/GHAT_Constitution_2025_Refined.pdf" target="_blank" rel="noopener noreferrer" className="text-primary hover:underline inline-block py-2">View Constitution — Effective 1 December 2024</a></p>''',
              '''          <h2>Trust Deed &amp; Constitution</h2>
          <p>Global Health Access Trust was constituted by Trust Deed with effect from 1 December 2024. The Trust Deed is its founding and principal governing document. The trustees later adopted a signed Constitution in June 2025 to record supplementary governance and operating arrangements, including those prepared during banking due diligence. The Constitution supports, and does not replace, the Trust Deed.</p>
          <p className="block"><Link to="/constitution" className="text-primary hover:underline inline-block py-2">View the Trust Deed &amp; Signed Constitution record →</Link></p>'''
          )

          replace(
              "src/pages/GovernanceLegalFrameworkPage.tsx",
              '''          <li>The signed Constitution and published governance policies</li>''',
              '''          <li>The Trust Deed, signed supplementary Constitution and published governance policies</li>'''
          )

          replace(
              "src/pages/FrequentlyAskedQuestionsPage.tsx",
              '''        <p>The Trust is governed by its signed Trust Deed, effective from 1 December 2024, together with its Board-approved governance, safeguarding, financial-control and risk policies.</p>''',
              '''        <p>The Trust was constituted by Trust Deed with effect from 1 December 2024. The Trust Deed is its founding and principal governing document. The trustees later adopted a signed Constitution in June 2025 as a supplementary governance and banking document; it does not replace the Trust Deed.</p>'''
          )

          pub = Path("src/pages/PublicationsPage.tsx")
          text = pub.read_text(encoding="utf-8")
          old = '''              <span className="text-xs uppercase tracking-widest text-muted-foreground">Governing Document</span>
              <h2 className="text-2xl font-serif font-bold mt-2 mb-4">Trust Constitution</h2>
              <p className="text-muted-foreground leading-relaxed mb-6 max-w-3xl">
                The signed governing document establishes the Trust's charitable purposes, Trustee powers and institutional framework.
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6 text-sm">
                <div><strong>Effective date</strong><br /><span className="text-muted-foreground">1 December 2024</span></div>
                <div><strong>Version</strong><br /><span className="text-muted-foreground">1.0 — Original</span></div>
                <div><strong>Document reference</strong><br /><span className="text-muted-foreground">GHAT-CONSTITUTION-1.0</span></div>
              </div>
              <Button asChild>
                <Link to="/constitution">View the Constitution</Link>
              </Button>'''
          new = '''              <span className="text-xs uppercase tracking-widest text-muted-foreground">Founding &amp; Governance Documents</span>
              <h2 className="text-2xl font-serif font-bold mt-2 mb-4">Trust Deed &amp; Signed Constitution</h2>
              <p className="text-muted-foreground leading-relaxed mb-6 max-w-3xl">
                The Trust Deed effective from 1 December 2024 is the founding and principal governing document of Global Health Access Trust. The signed Constitution adopted in June 2025 records supplementary governance and operating arrangements and does not replace the Trust Deed.
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6 text-sm">
                <div><strong>Trust Deed</strong><br /><span className="text-muted-foreground">Effective 1 December 2024</span></div>
                <div><strong>Constitution</strong><br /><span className="text-muted-foreground">Signed June 2025</span></div>
                <div><strong>Legal form</strong><br /><span className="text-muted-foreground">Charitable trust</span></div>
              </div>
              <Button asChild>
                <Link to="/constitution">View the document record</Link>
              </Button>'''
          if old not in text:
              raise SystemExit("Expected Publications document block was not found")
          pub.write_text(text.replace(old, new), encoding="utf-8")

          home = Path("src/pages/HomePage.tsx")
          text = home.read_text(encoding="utf-8")
          text = text.replace(
              'description="An unincorporated charitable organisation developing, funding and coordinating',
              'description="A charitable trust developing, funding and coordinating'
          )
          home.write_text(text, encoding="utf-8")
          PY

      - name: Verify and build
        shell: bash
        run: |
          if grep -RIn "unincorporated charitable organisation" src --include='*.ts' --include='*.tsx'; then
            echo "Incorrect legal reclassification remains" >&2
            exit 1
          fi
          grep -RIn "Trust Deed" src --include='*.ts' --include='*.tsx' >/dev/null
          grep -RIn "signed Constitution" src/pages/ConstitutionPage.tsx src/pages/AboutTheTrustPage.tsx src/pages/PublicationsPage.tsx >/dev/null
          npm ci
          npm run build

      - name: Commit the corrected legal position
        shell: bash
        run: |
          rm .github/workflows/restore-charitable-trust-position.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/workflows/restore-charitable-trust-position.yml
          git commit -m "Restore GHAT charitable trust and two-document position"
          git pull --rebase origin main
          git push origin HEAD:main
