name: Current workstreams validation

on:
  push:
    branches:
      - main
      - workstreams-live-build
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: current-workstreams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-workstreams:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check application
        run: bunx tsc --noEmit

      - name: Build production website
        run: bun run build

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          bunx vite preview --host 127.0.0.1 --port 4173 > /tmp/workstreams-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/workstreams-preview.log
          exit 1

      - name: Test all current workstream pages
        run: node scripts/workstreams-smoke.mjs

      - name: Report success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'GHAT current workstreams',
              description: 'Five project pages, homepage cards, routes, sources and mobile checks passed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'GHAT current workstreams',
              description: 'Current workstream validation failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
