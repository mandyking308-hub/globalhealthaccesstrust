name: Targeted GHAT homepage repair

on:
  push:
    branches: [main]
    paths:
      - ".github/targeted-homepage-repair.trigger"

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Apply preservation-first homepage corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path("src/pages/HomePage.tsx")
          text = home.read_text()

          button_import = 'import { Button } from "@/components/ui/button";\n'
          workstreams_import = 'import { HomepageWorkstreamsSection } from "@/components/workstreams/HomepageWorkstreamsSection";\n'
          if workstreams_import not in text:
              if button_import not in text:
                  raise SystemExit("Homepage button import anchor missing")
              text = text.replace(button_import, button_import + workstreams_import, 1)

          for obsolete_import in [
              'import clinicImage from "@/assets/ghat-maternal-care.jpg";\n',
              'import systemsImage from "@/assets/ghat-infrastructure-delivery.jpg";\n',
              'import ruralImage from "@/assets/ghat-capacity-training.jpg";\n',
          ]:
              text = text.replace(obsolete_import, "")

          start_marker = '        <section className="p-6 md:p-16 lg:p-24 border-b border-foreground/10 bg-background">'
          end_marker = '        <section className="bg-primary text-primary-foreground py-24 md:py-32">'
          start = text.find(start_marker)
          end = text.find(end_marker)
          if start == -1 or end == -1 or end <= start:
              raise SystemExit("Approved homepage section anchors were not found")

          replacement = '''        <div id="current-workstreams" className="scroll-mt-28">
          <HomepageWorkstreamsSection />
        </div>

'''
          text = text[:start] + replacement + text[end:]

          required = [
              'import heroImage from "@/assets/ghat-hero-community-health.jpg";',
              'src={heroImage}',
              'The Global Health Access Trust builds the systems that make healthcare possible.',
              'The Trust builds on decades of voluntary, self-funded and pro bono service',
              '<HomepageWorkstreamsSection />',
              'About the Trust',
              'From Need to Accountable Delivery',
              'Public-Benefit Project Areas',
              'Charitable Control and Accountability',
              'Supporter and Project-Team Workspaces',
              'Support Begins With a Pledge',
          ]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f"Required approved homepage content missing: {marker}")
          if 'Work and<br />Institutional Learning' in text:
              raise SystemExit("Obsolete institutional-learning section remains")
          if text.count('<HomepageWorkstreamsSection />') != 1:
              raise SystemExit("Homepage workstreams must appear exactly once")
          home.write_text(text)

          layout = Path("src/components/layout/Layout.tsx")
          layout.write_text('''import { Outlet } from "react-router-dom";
import { Header } from "./Header";
import { Footer } from "./Footer";
import { WorkNavigationStrip } from "./WorkNavigationStrip";
import { CookieBanner } from "@/components/CookieBanner";
import { Analytics } from "@/components/Analytics";
import { ContentProtection } from "@/components/ContentProtection";
import { WorkstreamFormContext } from "@/components/workstreams/WorkstreamFormContext";
import "@/styles/workstream-type-overrides.css";

export const Layout = () => (
  <div className="min-h-screen flex flex-col">
    <Header />
    <WorkNavigationStrip />
    <WorkstreamFormContext />
    <main id="main-content" className="flex-grow">
      <Outlet />
    </main>
    <Footer />
    <CookieBanner />
    <Analytics />
    <ContentProtection />
  </div>
);
''')

          conflict = Path("src/lib/workstreams/conflictRecovery.ts")
          conflict_text = conflict.read_text()
          old_import = 'import conflictImage from "@/assets/conflict-ukraine-humanitarian.jpg";'
          new_import = 'import conflictImage from "@/assets/emergency-relief-hero.jpg";'
          if old_import not in conflict_text:
              raise SystemExit("Conflict workstream image import anchor missing")
          conflict_text = conflict_text.replace(old_import, new_import, 1)
          conflict_text = conflict_text.replace(
              '"A calm humanitarian scene representing families and communities affected by war and displacement",',
              '"Emergency relief supplies and practical recovery support in a conflict-affected community",',
              1,
          )
          conflict.write_text(conflict_text)
          PY

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        run: |
          bun install --frozen-lockfile
          bunx vite build

      - name: Commit targeted repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/HomePage.tsx src/components/layout/Layout.tsx src/lib/workstreams/conflictRecovery.ts
          git commit -m "Restore approved homepage with targeted workstream placement"
          git push
