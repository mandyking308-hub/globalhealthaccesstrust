name: Website Release Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

env:
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Mark preview check pending
        uses: actions/github-script@v7
        with:
          script: |
            const targetUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'GHAT finished-site preview',
              description: 'Building and rendering the finished website',
              target_url: targetUrl
            });

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website and capture log
        id: build
        shell: bash
        run: |
          set +e
          bunx vite build > build-output.log 2>&1
          code=$?
          cat build-output.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghat-build-diagnostics
          path: build-output.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          bunx vite preview --host 0.0.0.0 --port 4173 > /tmp/ghat-preview.log 2>&1 &
          echo $! > /tmp/ghat-preview.pid
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ghat-preview.log
          exit 1

      - name: Render finished-site previews
        run: |
          mkdir -p preview-images
          cat > render-preview.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { writeFile } from 'node:fs/promises';

          const pages = [
            ['home', '/'],
            ['our-work', '/our-work'],
            ['commission-project', '/commission-projects'],
            ['pledge-contribution', '/donate'],
            ['project-team-application', '/volunteer-apply'],
          ];

          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({ viewport: { width: 1440, height: 1000 } });
          const results = [];

          for (const [name, path] of pages) {
            const page = await context.newPage();
            const consoleErrors = [];
            page.on('console', (message) => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            const response = await page.goto(`http://127.0.0.1:4173${path}`, {
              waitUntil: 'networkidle',
              timeout: 60000,
            });
            await page.screenshot({ path: `preview-images/${name}.png`, fullPage: true });
            results.push({ name, path, status: response?.status() ?? null, title: await page.title(), consoleErrors });
            await page.close();
          }

          await browser.close();
          await writeFile('preview-images/preview-report.json', JSON.stringify(results, null, 2));
          EOF
          bun render-preview.mjs

      - name: Upload finished-site previews
        uses: actions/upload-artifact@v4
        with:
          name: ghat-finished-site-preview
          path: preview-images
          if-no-files-found: error
          retention-days: 30

      - name: Mark preview check successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const targetUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'GHAT finished-site preview',
              description: 'Build passed and finished-site previews were rendered',
              target_url: targetUrl
            });

      - name: Mark preview check failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const targetUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'GHAT finished-site preview',
              description: 'Build or finished-site preview rendering failed',
              target_url: targetUrl
            });
