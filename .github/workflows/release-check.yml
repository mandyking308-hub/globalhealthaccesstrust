name: Final GHAT Legal Wording Audit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix final hidden wording and audit the repository
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path("src/pages/HomePage.tsx")
          text = home.read_text(encoding="utf-8")
          old = "An unincorporated charitable organisation developing, funding and coordinating"
          new = "A charitable trust developing, funding and coordinating"
          if old not in text:
              raise SystemExit("Expected homepage metadata wording was not found")
          home.write_text(text.replace(old, new), encoding="utf-8")
          PY

          if grep -RIn "unincorporated charitable organisation" src --include='*.ts' --include='*.tsx'; then
            echo "Incorrect legal classification remains" >&2
            exit 1
          fi

          if grep -RIn "Constitution is the governing document\|signed Constitution is the governing document\|governed by its Constitution adopted" src --include='*.ts' --include='*.tsx'; then
            echo "Constitution-only governing wording remains" >&2
            exit 1
          fi

          grep -RIn "charitable trust" src --include='*.ts' --include='*.tsx' >/dev/null
          grep -RIn "Trust Deed" src --include='*.ts' --include='*.tsx' >/dev/null
          grep -RIn "supplementary" src/pages/ConstitutionPage.tsx src/pages/AboutTheTrustPage.tsx src/pages/GovernanceLegalFrameworkPage.tsx src/pages/PublicationsPage.tsx >/dev/null

      - name: Restore normal release workflow
        shell: bash
        run: |
          git show HEAD^^:.github/workflows/release-check.yml > .github/workflows/release-check.yml
          rm -f legal-repair-trigger.txt

      - name: Build website
        run: |
          npm ci
          npm run build

      - name: Commit final repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/HomePage.tsx .github/workflows/release-check.yml legal-repair-trigger.txt
          git commit -m "Complete final GHAT legal wording audit"
          git pull --rebase origin main
          git push origin HEAD:main
