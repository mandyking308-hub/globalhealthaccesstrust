name: Release checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun for sitemap generation
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install locked dependencies
        run: npm ci

      - name: Lint existing codebase
        continue-on-error: true
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Install browser smoke-test tooling
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/ghat-preview.log 2>&1 &
          echo $! > /tmp/ghat-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ghat-preview.log
          exit 1

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
        run: node scripts/release-smoke.mjs

      - name: Upload smoke-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore

      - name: Show preview log on failure
        if: failure()
        run: cat /tmp/ghat-preview.log || true

  production-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser smoke-test tooling
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Wait for deployment and test custom domain
        env:
          SMOKE_BASE_URL: https://globalhealthaccesstrust.com
        run: |
          for attempt in {1..12}; do
            echo "Production verification attempt ${attempt}/12"
            if node scripts/release-smoke.mjs; then
              exit 0
            fi
            sleep 20
          done
          exit 1

      - name: Upload production smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore
