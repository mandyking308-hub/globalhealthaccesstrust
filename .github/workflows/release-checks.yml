name: Release checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, bank-readiness-final]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Lint bank-readiness application changes
        run: |
          bunx eslint \
            src/App.tsx \
            src/components/TrusteeBiographiesGrid.tsx \
            src/components/layout/Footer.tsx \
            src/components/layout/Header.tsx \
            src/pages/AboutTheTrustPage.tsx \
            src/pages/ContactPage.tsx \
            src/pages/ContactTheTrustPage.tsx \
            src/pages/CookiePolicyPage.tsx \
            src/pages/DonatePage.tsx \
            src/pages/DonationFormPage.tsx \
            src/pages/FinancialControlsPage.tsx \
            src/pages/FrequentlyAskedQuestionsPage.tsx \
            src/pages/GovernanceLegalFrameworkPage.tsx \
            src/pages/HomePage.tsx \
            src/pages/HowWeWorkPage.tsx \
            src/pages/OurWorkPage.tsx \
            src/pages/PublicationsPage.tsx \
            src/pages/RiskManagementPage.tsx \
            src/pages/SafeguardingPage.tsx \
            src/pages/SupportRequestPage.tsx \
            src/pages/SupportTheTrustPage.tsx \
            src/pages/TrusteeBiographiesPage.tsx \
            src/pages/WhatWeDoPage.tsx

      - name: Lint changed Edge Functions
        run: deno lint supabase/functions/contact-notification/index.ts supabase/functions/gocardless-create-flow/index.ts

      - name: Type-check complete application
        run: bunx tsc --noEmit

      - name: Build production bundle
        run: bun run build

      - name: Install browser smoke-test tooling
        run: |
          bun add --dev --no-save playwright@1.52.0
          bunx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          bun run preview -- --host 127.0.0.1 --port 4173 > /tmp/ghat-preview.log 2>&1 &
          echo $! > /tmp/ghat-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ghat-preview.log
          exit 1

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
        run: node scripts/release-smoke.mjs

      - name: Upload smoke-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore

      - name: Show preview log on failure
        if: failure()
        run: cat /tmp/ghat-preview.log || true

  # This job tests the already-published custom domain and must be run manually
  # only after Mandy has approved a future deployment.
  production-smoke:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install browser smoke-test tooling
        run: |
          bun add --dev --no-save playwright@1.52.0
          bunx playwright install --with-deps chromium

      - name: Test the published custom domain
        env:
          SMOKE_BASE_URL: https://globalhealthaccesstrust.com
        run: node scripts/release-smoke.mjs

      - name: Upload production smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore
