name: Release checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: release-check-placeholder-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Lint existing codebase
        continue-on-error: true
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build production bundle
        run: bun run build

      - name: Verify live legal documents
        run: |
          set -a
          source .env
          set +a
          node scripts/verify-live-legal.mjs

      - name: Install browser smoke-test tooling
        run: |
          bun add --dev --no-save playwright@1.52.0
          bunx playwright install --with-deps chromium

      - name: Start production preview
        run: |
          bun run preview -- --host 127.0.0.1 --port 4173 > /tmp/ghat-preview.log 2>&1 &
          echo $! > /tmp/ghat-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/ghat-preview.log
          exit 1

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
        run: node scripts/release-smoke.mjs

      - name: Upload smoke-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore

      - name: Show preview log on failure
        if: failure()
        run: cat /tmp/ghat-preview.log || true

  # The custom domain is deployed by Lovable rather than by this GitHub workflow.
  # Run this job deliberately after Lovable has synced and published the latest commit,
  # preventing false failure emails while the live deployment is still catching up.
  production-smoke:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify live legal documents
        run: |
          set -a
          source .env
          set +a
          node scripts/verify-live-legal.mjs

      - name: Install browser smoke-test tooling
        run: |
          bun add --dev --no-save playwright@1.52.0
          bunx playwright install --with-deps chromium

      - name: Test the published custom domain
        env:
          SMOKE_BASE_URL: https://globalhealthaccesstrust.com
        run: node scripts/release-smoke.mjs

      - name: Upload production smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-report
          path: release-smoke-failures.txt
          if-no-files-found: ignore
