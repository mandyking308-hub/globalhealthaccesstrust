name: Live deployment proof

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: live-deployment-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-live-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check live release manifest
        id: proof
        continue-on-error: true
        shell: bash
        run: |
          expected="$GITHUB_SHA"
          actual=""

          for attempt in {1..36}; do
            payload="$(curl --fail --silent --show-error --max-time 20 \
              "https://globalhealthaccesstrust.com/release.json?expected=${expected}&attempt=${attempt}" \
              2>/tmp/ghat-release-curl-error || true)"

            actual="$(node -e 'try { const value = JSON.parse(process.argv[1]); process.stdout.write(value.source_commit || ""); } catch {}' "$payload")"
            echo "Attempt ${attempt}: expected ${expected}, live ${actual:-unavailable}"

            if [ "$actual" = "$expected" ]; then
              echo "actual_commit=$actual" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 10
          done

          echo "actual_commit=${actual:-unavailable}" >> "$GITHUB_OUTPUT"
          if [ -s /tmp/ghat-release-curl-error ]; then
            cat /tmp/ghat-release-curl-error
          fi
          exit 1

      - name: Report live deployment success
        if: steps.proof.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'GHAT live deployment matches GitHub',
              description: `Live site is serving ${context.sha.slice(0, 7)}`,
              target_url: `https://globalhealthaccesstrust.com/release.json`,
            });

      - name: Report live deployment mismatch
        if: steps.proof.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const actual = `${{ steps.proof.outputs.actual_commit }}` || 'unavailable';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'GHAT live deployment matches GitHub',
              description: `Live site reports ${actual.slice(0, 12)}; expected ${context.sha.slice(0, 7)}`,
              target_url: `https://globalhealthaccesstrust.com/release.json`,
            });

      - name: Fail when the live site is behind
        if: steps.proof.outcome != 'success'
        run: exit 1
