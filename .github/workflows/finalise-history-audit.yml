name: Finalise GHAT history audit tooling

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finalise-history-audit.yml"

permissions:
  contents: write

jobs:
  finalise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix screenshot visibility and remove temporary audit files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          release = Path('.github/workflows/release-check.yml')
          text = release.read_text()
          old = "document.querySelectorAll('[role=\"dialog\"], aside, body > div')"
          new = "document.querySelectorAll('[role=\"dialog\"], [class*=\"cookie\"], [id*=\"cookie\"]')"
          if old not in text:
              raise SystemExit('Expected screenshot selector was not found')
          release.write_text(text.replace(old, new, 1))

          for temporary in [
              Path('.github/workflows/history-responsive-audit.yml'),
              Path('.github/workflows/history-visual-review.yml'),
              Path('src/pages/CharitableHistoryAuditTrigger.tsx'),
          ]:
              if temporary.exists():
                  temporary.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalise responsive history review tooling"
          git push

# Triggered after workflow registration.
